<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>MD NISHAT dsnr | Pro Graphics Designer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        
        /* প্রোফেশনাল কালার প্যালেট */
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8; /* স্কাই ব্লু */
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #fff; font-family: 'Inter', sans-serif; margin: 0; line-height: 1.6;
        }

        /* হেডার */
        header { padding: 30px 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { width: 60px; height: 60px; border-radius: 15px; border: 2px solid var(--accent-color); box-shadow: 0 0 15px var(--accent-color); }
        
        /* হিরো সেকশন */
        .hero { padding: 100px 10%; text-align: center; }
        .hero h1 { font-size: 5rem; margin: 0; background: linear-gradient(to right, #fff, var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* গ্লাস কার্ড ইফেক্ট (এটি খালি ভাব দূর করবে) */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 50px 10%; }
        .work-card { background: var(--glass-bg); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; }
        .work-card:hover { transform: translateY(-10px); border-color: var(--accent-color); box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2); }
        .work-card img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; }

        /* বাটন */
        .btn-box { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .btn { padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; border: 2px solid var(--accent-color); color: white; }
        .btn:hover { background: var(--accent-color); color: #000; }
    </style>
</head>
<body>

    <header>
        <img src="images/logo.jpg" class="logo-img" alt="Logo">
        <div style="font-size: 20px; font-weight: bold;">MD NISHAT <span style="color:var(--accent-color)">DSNR</span></div>
    </header>

    <section class="hero">
        <h1>CREATIVE DESIGNER</h1>
        <p>আপনার চিন্তাধারাকে আমি দিচ্ছি এক অনন্য ভিজ্যুয়াল রূপ।</p>
    </section>

    <div class="portfolio-grid">
        <div class="work-card"><img src="images/work1.jpg" alt="Work 1"></div>
        <div class="work-card"><img src="images/work2.jpg" alt="Work 2"></div>
        <div class="work-card"><img src="images/work3.jpg" alt="Work 3"></div>
    </div>

    <div style="text-align: center; padding: 80px 10%; background: rgba(0,0,0,0.2);">
        <h2>প্রজেক্ট নিয়ে কথা বলুন</h2>
        <div class="btn-box">
            <a href="https://wa.me/8801778780137" class="btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="https://www.facebook.com/share/1AHyQyUJwr/" class="btn"><i class="fab fa-facebook"></i> Facebook</a>
        </div>
    </div>

</body>
</html>
